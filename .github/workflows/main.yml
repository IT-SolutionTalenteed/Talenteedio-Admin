name: Deploy Admin (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Talenteed.io server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TALENTEED_HOST }}
          username: ${{ secrets.SSH_TALENTEED_USERNAME }}
          password: ${{ secrets.SSH_TALENTEED_PASSWORD }}
          port: ${{ secrets.SSH_TALENTEED_PORT }}
          script: |
            set -e
            echo "🚀 Starting Admin deployment..."
            cd /home/talenteedio/sites/Talenteed-Admin/
            ./scripts/deploy_prod.sh