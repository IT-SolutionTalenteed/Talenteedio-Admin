name: Deploy Admin (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Talenteed.io server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TALENTEED_HOST }}
          username: ${{ secrets.SSH_TALENTEED_USERNAME }}
          password: ${{ secrets.SSH_TALENTEED_PASSWORD }}
          port: ${{ secrets.SSH_TALENTEED_PORT }}
          script: |
            set -e
            echo "🚀 Starting Admin deployment..."
            cd /home/talenteedio/sites/Talenteed-Admin/
            
            # Charger NVM et Node
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use v18.18
            
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            
            echo "📦 Installing dependencies..."
            npm install
            
            echo "🛠️ Building Admin (skipping type-check for now)..."
            npm run build-only
            
            echo "✅ Deployment completed!"
            ls -la dist/
