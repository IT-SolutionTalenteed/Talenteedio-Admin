name: Deploy Admin (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TALENTEED_HOST }}
          username: ${{ secrets.SSH_TALENTEED_USERNAME }}
          password: ${{ secrets.SSH_TALENTEED_PASSWORD }}
          port: ${{ secrets.SSH_TALENTEED_PORT }}
          script: |
            echo "🚀 Starting Admin deployment..."

            cd /home/talenteedio/sites/Talenteed-Admin/

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm use 18

            git fetch origin
            git reset --hard origin/main

            npm install
            npm run build

            echo "✅ Deployment completed!"
            ls -la dist/